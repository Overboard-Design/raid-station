<style>

body{
font-family:'Audiowide', sans-serif;
text-align:center;
}

.stream-section{
margin-bottom:60px;
}

.stream-container{
display:flex;
justify-content:center;
gap:20px;
max-width:1200px;
margin:auto;
}

.stream-container iframe{
border:none;
}

.video{
width:854px;
height:480px;
}

.chat{
width:350px;
height:480px;
}

/* MOBILE */

@media (max-width:1000px){

.stream-container{
flex-direction:column;
align-items:center;
}

.video{
width:100%;
aspect-ratio:16/9;
height:auto;
}

.chat{
width:100%;
height:400px;
}

}

</style>

</head>
